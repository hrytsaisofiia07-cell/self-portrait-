<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Face</title>

<style>
  body {
    margin: 0;
    background: #b8acd0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: sans-serif;
  }

  .face {
    position: relative;
    width: 90vw;
    height: 90vh;
    max-width: 500px;
    max-height: 800px;
  }

  .eye {
    position: absolute;
    width: 60px;
    height: 80px;
    background: black;
    border-radius: 50%;
    border: 3px solid #1da1f2;
  }

  .eye::after {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: white;
    border-radius: 50%;
    top: 10px;
    left: 10px;
  }

  .eye.left { left: 25%; top: 30%; }
  .eye.right { right: 25%; top: 30%; }

  .brow {
    position: absolute;
    width: 100px;
    height: 20px;
    background: #5a2e2e;
  }

  .brow.left {
    left: 20%;
    top: 22%;
    transform: rotate(-15deg);
  }

  .brow.right {
    right: 20%;
    top: 22%;
    transform: rotate(15deg);
  }

  .mouth {
    position: absolute;
    bottom: 25%;
    left: 50%;
    transform: translateX(-50%) scaleY(1);
    width: 200px;
    height: 100px;
    background: pink;
    border: 3px solid red;
    border-radius: 50%;
  }

  .teeth {
    position: absolute;
    width: 50px;
    height: 30px;
    background: white;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    border-radius: 5px;
  }

  button {
    position: fixed;
    bottom: 20px;
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: black;
    color: white;
  }

  .fallback {
    position: fixed;
    top: 20px;
    color: red;
    text-align: center;
    width: 100%;
  }
</style>
</head>

<body>

<div class="face">
  <div class="brow left"></div>
  <div class="brow right"></div>

  <div class="eye left"></div>
  <div class="eye right"></div>

  <div class="mouth" id="mouth">
    <div class="teeth"></div>
  </div>
</div>

<div id="fallback" class="fallback"></div>

<button id="startBtn">Начать 🎭</button>

<script>
/* =========================
   УТИЛИТЫ
========================= */
const clamp = (v, min, max) => Math.min(Math.max(v, min), max);
const lerp = (a, b, t) => a + (b - a) * t;

/* =========================
   ПЕРЕМЕННЫЕ
========================= */
let audioCtx, osc, gainNode;
let started = false;

let intensity = 0;
let smoothed = 0;

const maxTilt = 90;

/* =========================
   AUDIO INIT
========================= */
function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  osc = audioCtx.createOscillator();
  gainNode = audioCtx.createGain();

  osc.type = "sawtooth";
  osc.frequency.value = 200;

  gainNode.gain.value = 0;

  osc.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  osc.start();
}

/* =========================
   ORIENTATION
========================= */
function handleOrientation(event) {
  if (!started) return;

  const beta = event.beta || 0;
  const gamma = event.gamma || 0;

  // интенсивность
  intensity = clamp((Math.abs(beta) + Math.abs(gamma)) / maxTilt, 0, 1);

  // сглаживание
  smoothed = lerp(smoothed, intensity, 0.1);

  updateVisuals();
  updateAudio();
}

/* =========================
   ВИЗУАЛ
========================= */
const mouth = document.getElementById("mouth");

function updateVisuals() {
  const scale = 1 + smoothed * 2;
  mouth.style.transform = `translateX(-50%) scaleY(${scale})`;
}

/* =========================
   AUDIO UPDATE
========================= */
function updateAudio() {
  if (!audioCtx) return;

  const now = audioCtx.currentTime;

  const frequency = 200 + smoothed * 1000;
  const volume = Math.pow(smoothed, 2);

  osc.frequency.setTargetAtTime(frequency, now, 0.05);
  gainNode.gain.setTargetAtTime(volume, now, 0.05);
}

/* =========================
   START
========================= */
document.getElementById("startBtn").onclick = async () => {
  document.getElementById("startBtn").style.display = "none";

  // iOS permission
  if (typeof DeviceOrientationEvent.requestPermission === "function") {
    try {
      const response = await DeviceOrientationEvent.requestPermission();
      if (response !== "granted") {
        document.getElementById("fallback").innerText = "Нет доступа к датчикам";
        return;
      }
    } catch {
      document.getElementById("fallback").innerText = "Ошибка доступа";
      return;
    }
  }

  // audio init
  initAudio();

  started = true;

  window.addEventListener("deviceorientation", handleOrientation);
};

/* =========================
   FALLBACK
========================= */
if (!window.DeviceOrientationEvent) {
  document.getElementById("fallback").innerText =
    "Датчики не поддерживаются на этом устройстве";
}
</script>

</body>
</html>
